<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoGuard — Environmental Monitoring</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c0a;--bg2:#0d1410;--card:#121c17;--bdr:#1a2e24;--bdr-l:#243d32;--fg:#e2ede7;--fg2:#a3bfb0;--muted:#5e7d6d;--accent:#10b981;--accent-d:rgba(16,185,129,.15);--danger:#ef4444;--danger-d:rgba(239,68,68,.15);--warn:#f59e0b;--warn-d:rgba(245,158,11,.15);--info:#06b6d4;--info-d:rgba(6,182,212,.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden}
h1,h2,h3,h4,h5{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bdr-l);border-radius:3px}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--bdr);z-index:50;display:flex;flex-direction:column;transition:transform .3s}
.main-wrap{margin-left:260px;min-height:100vh}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;margin:2px 12px;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--muted);font-size:14px;font-weight:500;position:relative}
.nav-item:hover{color:var(--fg2);background:rgba(16,185,129,.06)}
.nav-item.active{color:var(--accent);background:var(--accent-d)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-item i{width:20px;text-align:center;font-size:15px}
.badge-dot{position:absolute;right:12px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}
.stat-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:22px;transition:all .3s;position:relative;overflow:hidden}
.stat-card:hover{border-color:var(--bdr-l);transform:translateY(-2px)}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;filter:blur(40px);opacity:.15}
.stat-card.g::after{background:var(--accent)}.stat-card.r::after{background:var(--danger)}.stat-card.y::after{background:var(--warn)}.stat-card.b::after{background:var(--info)}
.cc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:24px}
.drop-zone{border:2px dashed var(--bdr-l);border-radius:16px;padding:60px 40px;text-align:center;transition:all .3s;cursor:pointer}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--accent-d)}
@keyframes scanMove{0%{top:0;opacity:1}100%{top:calc(100% - 2px);opacity:.3}}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);box-shadow:0 0 15px var(--accent);animation:scanMove 2s ease-in-out infinite;z-index:10}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease both}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 2s ease infinite}
.tbl{width:100%;border-collapse:separate;border-spacing:0}
.tbl th{text-align:left;padding:12px 16px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--bdr)}
.tbl td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(26,46,36,.5);color:var(--fg2)}
.tbl tr:hover td{background:rgba(16,185,129,.03)}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.tag.g{background:var(--accent-d);color:var(--accent)}.tag.r{background:var(--danger-d);color:var(--danger)}.tag.y{background:var(--warn-d);color:var(--warn)}.tag.b{background:var(--info-d);color:var(--info)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#059669;transform:translateY(-1px)}
.btn-s{background:var(--card);color:var(--fg2);border:1px solid var(--bdr)}.btn-s:hover{border-color:var(--bdr-l);color:var(--fg)}
.btn-d{background:var(--danger-d);color:var(--danger)}.btn-d:hover{background:var(--danger);color:#fff}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px}
.inp{background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:10px 14px;color:var(--fg);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;width:100%}
.inp:focus{border-color:var(--accent)}.inp::placeholder{color:var(--muted)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
.modal-ov.show{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:28px;max-width:600px;width:90%;max-height:85vh;overflow-y:auto;transform:scale(.95);transition:transform .3s}
.modal-ov.show .modal{transform:scale(1)}
.toast-c{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:12px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:fadeUp .3s ease;min-width:280px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.ts{background:#065f46;color:#a7f3d0;border:1px solid #10b981}
.toast.te{background:#7f1d1d;color:#fca5a5;border:1px solid #ef4444}
.toast.tw{background:#78350f;color:#fde68a;border:1px solid #f59e0b}
.toast.ti{background:#164e63;color:#a5f3fc;border:1px solid #06b6d4}
.gauge-ring{transition:stroke-dashoffset 1s ease}
.pbar{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .3s ease;background:linear-gradient(90deg,var(--accent),#34d399)}
.ev-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;transition:all .3s;cursor:pointer}
.ev-card:hover{border-color:var(--bdr-l);transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.live-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent)}
.detect-box{position:absolute;pointer-events:none;z-index:8}
.detect-box .c{position:absolute;width:14px;height:14px}
.detect-box .c.tl{top:-1px;left:-1px;border-top:2.5px solid var(--accent);border-left:2.5px solid var(--accent)}
.detect-box .c.tr{top:-1px;right:-1px;border-top:2.5px solid var(--accent);border-right:2.5px solid var(--accent)}
.detect-box .c.bl{bottom:-1px;left:-1px;border-bottom:2.5px solid var(--accent);border-left:2.5px solid var(--accent)}
.detect-box .c.br{bottom:-1px;right:-1px;border-bottom:2.5px solid var(--accent);border-right:2.5px solid var(--accent)}
.detect-box.td .c{border-color:var(--danger)}.detect-box.tw2 .c{border-color:var(--warn)}.detect-box.tf .c{border-color:var(--info)}.detect-box.tm .c{border-color:#a78bfa}
.detect-box .f{position:absolute;inset:0;border-radius:4px}
.detect-box.td .f{background:rgba(239,68,68,.08)}.detect-box.tw2 .f{background:rgba(245,158,11,.08)}.detect-box.tf .f{background:rgba(6,182,212,.12)}.detect-box.tm .f{background:rgba(167,139,250,.08)}
.detect-box .f{background:rgba(16,185,129,.07)}
.detect-box .lb{position:absolute;top:-26px;left:-2px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px 4px 4px 0;white-space:nowrap}
.detect-box .lb{background:var(--accent);color:#fff}.detect-box.td .lb{background:var(--danger)}.detect-box.tw2 .lb{background:var(--warn);color:#000}.detect-box.tf .lb{background:var(--info)}.detect-box.tm .lb{background:#a78bfa;color:#fff}
.face-extract{position:relative;border-radius:12px;overflow:hidden;background:#000}
.face-extract img{width:100%;height:100%;object-cover}
.face-extract .scan-overlay{position:absolute;inset:0;background:rgba(6,182,212,.08);border:2px solid var(--info);border-radius:12px}
.face-extract .scan-overlay::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(6,182,212,.15) 50%,transparent 60%);animation:faceScan 2s ease-in-out infinite}
@keyframes faceScan{0%,100%{opacity:0}50%{opacity:1}}
@media(max-width:1024px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-wrap{margin-left:0}.mob-tog{display:flex!important}}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar">
<div class="p-5 border-b border-[var(--bdr)]"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-[var(--accent-d)] flex items-center justify-center"><i class="fa-solid fa-shield-halved text-[var(--accent)] text-lg"></i></div><div><h1 class="text-base font-bold">EcoGuard</h1><p class="text-[10px] text-[var(--muted)] tracking-widest uppercase">Monitoring System</p></div></div></div>
<nav class="flex-1 py-4 overflow-y-auto">
<div class="px-5 mb-2"><span class="text-[10px] font-semibold text-[var(--muted)] tracking-widest uppercase">Main</span></div>
<div class="nav-item active" data-nav="dashboard" onclick="go('dashboard')"><i class="fa-solid fa-grid-2"></i>Dashboard</div>
<div class="nav-item" data-nav="analysis" onclick="go('analysis')"><i class="fa-solid fa-video"></i>Video Analysis</div>
<div class="nav-item" data-nav="evidence" onclick="go('evidence')"><i class="fa-solid fa-folder-open"></i>Evidence Vault</div>
<div class="px-5 mt-5 mb-2"><span class="text-[10px] font-semibold text-[var(--muted)] tracking-widest uppercase">Management</span></div>
<div class="nav-item" data-nav="database" onclick="go('database')"><i class="fa-solid fa-database"></i>Person Database</div>
<div class="nav-item" data-nav="reports" onclick="go('reports')"><i class="fa-solid fa-file-lines"></i>Reports</div>
<div class="nav-item" data-nav="admin" onclick="go('admin')"><i class="fa-solid fa-users-gear"></i>Admin Panel</div>
<div class="nav-item" data-nav="alerts" onclick="go('alerts')"><i class="fa-solid fa-bell"></i>Alerts<span class="badge-dot" id="alertBadge">5</span></div>
</nav>
<div class="p-4 border-t border-[var(--bdr)]"><div class="flex items-center gap-3"><img src="https://picsum.photos/seed/admin99/80/80.jpg" class="w-9 h-9 rounded-lg object-cover"><div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate">Sarah Chen</p><p class="text-[11px] text-[var(--muted)]">System Admin</p></div></div></div>
</aside>
<button class="mob-tog hidden fixed top-4 left-4 z-[60] w-10 h-10 rounded-xl bg-[var(--card)] border border-[var(--bdr)] items-center justify-center text-[var(--fg)]" onclick="$('sidebar').classList.toggle('open')"><i class="fa-solid fa-bars"></i></button>
<div class="main-wrap">
<header class="sticky top-0 z-40 border-b border-[var(--bdr)] px-6 py-3 flex items-center justify-between" style="background:rgba(8,12,10,.85);backdrop-filter:blur(12px)">
<div class="flex items-center gap-2 text-xs text-[var(--muted)]"><div class="live-dot pulse"></div><span class="font-semibold text-[var(--accent)]">LIVE</span><span>Monitoring</span></div>
<div class="flex items-center gap-3"><button class="w-9 h-9 rounded-xl bg-[var(--card)] border border-[var(--bdr)] flex items-center justify-center text-[var(--muted)] hover:text-[var(--fg)] relative" onclick="go('alerts')"><i class="fa-solid fa-bell text-sm"></i><span class="absolute -top-1 -right-1 w-4 h-4 bg-[var(--danger)] rounded-full text-[9px] font-bold flex items-center justify-center text-white" id="hdrBadge">5</span></button><span class="text-xs text-[var(--muted)] hidden md:inline" id="clock"></span></div>
</header>
<main class="p-6" id="MC"></main>
</div>
<div class="toast-c" id="toastC"></div>
<div class="modal-ov" id="modalOv" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalC"></div></div>

<script>
/* ===== DATA ===== */
const P=[
{id:"PER-001",name:"James Richardson",age:34,address:"142 Oak St, Springfield",v:3,st:"flagged",ph:"https://picsum.photos/seed/james01/200/200.jpg",phone:"(555) 234-5678"},
{id:"PER-002",name:"Maria Santos",age:28,address:"89 Elm Ave, Riverside",v:1,st:"active",ph:"https://picsum.photos/seed/maria02/200/200.jpg",phone:"(555) 345-6789"},
{id:"PER-003",name:"David Okonkwo",age:41,address:"567 Pine Rd, Lakewood",v:5,st:"suspended",ph:"https://picsum.photos/seed/david03/200/200.jpg",phone:"(555) 456-7890"},
{id:"PER-004",name:"Emily Zhang",age:26,address:"23 Maple Ct, Greenfield",v:0,st:"active",ph:"https://picsum.photos/seed/emily04/200/200.jpg",phone:"(555) 567-8901"},
{id:"PER-005",name:"Robert Fischer",age:52,address:"901 Cedar Blvd, Hilltown",v:7,st:"suspended",ph:"https://picsum.photos/seed/robert05/200/200.jpg",phone:"(555) 678-9012"},
{id:"PER-006",name:"Aisha Patel",age:31,address:"345 Birch Ln, Oakdale",v:2,st:"flagged",ph:"https://picsum.photos/seed/aisha06/200/200.jpg",phone:"(555) 789-0123"},
{id:"PER-007",name:"Carlos Mendez",age:38,address:"78 Walnut Dr, Bayview",v:1,st:"active",ph:"https://picsum.photos/seed/carlos07/200/200.jpg",phone:"(555) 890-1234"},
{id:"PER-008",name:"Lisa Johansson",age:45,address:"12 Aspen Way, Pinewood",v:4,st:"flagged",ph:"https://picsum.photos/seed/lisa08/200/200.jpg",phone:"(555) 901-2345"}
];
const EV=[
{id:"EVD-1047",dt:"2025-01-14 09:32",loc:"Central Park, Sector B",tp:"Plastic Waste",st:"confirmed",match:"James Richardson",lit:42,th:"https://picsum.photos/seed/ev1/400/300.jpg",face:"https://picsum.photos/seed/face1/120/120.jpg"},
{id:"EVD-1046",dt:"2025-01-14 08:15",loc:"Beachfront Promenade",tp:"Organic Waste",st:"review",match:null,lit:28,th:"https://picsum.photos/seed/ev2/400/300.jpg",face:null},
{id:"EVD-1045",dt:"2025-01-13 22:41",loc:"Market Street & 5th",tp:"Mixed Litter",st:"confirmed",match:"David Okonkwo",lit:67,th:"https://picsum.photos/seed/ev3/400/300.jpg",face:"https://picsum.photos/seed/face3/120/120.jpg"},
{id:"EVD-1044",dt:"2025-01-13 18:05",loc:"Riverside Walk Path",tp:"Glass Bottles",st:"dismissed",match:null,lit:15,th:"https://picsum.photos/seed/ev4/400/300.jpg",face:null},
{id:"EVD-1043",dt:"2025-01-13 14:22",loc:"Oakwood Plaza",tp:"Paper Waste",st:"confirmed",match:"Aisha Patel",lit:33,th:"https://picsum.photos/seed/ev5/400/300.jpg",face:"https://picsum.photos/seed/face5/120/120.jpg"},
{id:"EVD-1042",dt:"2025-01-12 11:50",loc:"Highway 7 Rest Stop",tp:"Hazardous Waste",st:"review",match:"Robert Fischer",lit:85,th:"https://picsum.photos/seed/ev6/400/300.jpg",face:"https://picsum.photos/seed/face6/120/120.jpg"}
];
const RP=[
{id:"RPT-2094",dt:"2025-01-14",sub:"Repeat Littering - Central Park",per:"James Richardson",fine:"$500",st:"issued"},
{id:"RPT-2093",dt:"2025-01-13",sub:"Hazardous Waste Dumping",per:"Robert Fischer",fine:"$2,000",st:"pending"},
{id:"RPT-2092",dt:"2025-01-13",sub:"Public Littering - Market St",per:"David Okonkwo",fine:"$350",st:"paid"},
{id:"RPT-2091",dt:"2025-01-12",sub:"Illegal Dumping Near School",per:"Lisa Johansson",fine:"$750",st:"issued"},
{id:"RPT-2090",dt:"2025-01-11",sub:"Commercial Waste Violation",per:"Aisha Patel",fine:"$400",st:"appealed"}
];
const AL=[
{id:1,sev:"critical",msg:"Hazardous waste at Highway 7 Rest Stop — immediate response",t:"2 min ago",read:false,ic:"fa-radiation"},
{id:2,sev:"high",msg:"Repeat offender David Okonkwo detected on Market Street",t:"15 min ago",read:false,ic:"fa-user-shield"},
{id:3,sev:"high",msg:"New video from Beachfront shows heavy littering",t:"32 min ago",read:false,ic:"fa-video"},
{id:4,sev:"medium",msg:"AI model v3.2.1 ready for deployment",t:"1 hr ago",read:false,ic:"fa-download"},
{id:5,sev:"low",msg:"Monthly compliance report ready",t:"2 hrs ago",read:false,ic:"fa-file-lines"}
];
const US=[
{name:"Sarah Chen",role:"System Admin",ll:"2 min ago",st:"online",ph:"https://picsum.photos/seed/admin99/80/80.jpg"},
{name:"Marcus Webb",role:"Senior Analyst",ll:"15 min ago",st:"online",ph:"https://picsum.photos/seed/user02/80/80.jpg"},
{name:"Priya Sharma",role:"Field Officer",ll:"1 hr ago",st:"away",ph:"https://picsum.photos/seed/user03/80/80.jpg"},
{name:"Jake Morrison",role:"Data Analyst",ll:"3 hrs ago",st:"offline",ph:"https://picsum.photos/seed/user04/80/80.jpg"}
];
const HS=[{n:"Central Park, Sector B",c:347,tr:"+12%",cl:"var(--danger)"},{n:"Market Street & 5th",c:289,tr:"+8%",cl:"var(--warn)"},{n:"Highway 7 Rest Stop",c:234,tr:"+23%",cl:"var(--danger)"},{n:"Beachfront Promenade",c:198,tr:"-5%",cl:"var(--accent)"},{n:"Oakwood Plaza",c:156,tr:"+3%",cl:"var(--warn)"}];

/* ===== STATE ===== */
let S={view:'dashboard',tc:null,yc:null,ar:null};
const $=id=>document.getElementById(id);

/* ===== UTILS ===== */
function go(v){S.view=v;document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.querySelector('[data-nav="'+v+'"]')?.classList.add('active');$('sidebar').classList.remove('open');const m=$('MC');if(v==='dashboard')rDash(m);else if(v==='analysis')rAna(m);else if(v==='evidence')rEv(m);else if(v==='database')rDB(m);else if(v==='reports')rRpt(m);else if(v==='admin')rAdm(m);else if(v==='alerts')rAl(m)}
function toast(msg,type='ts'){const ic={ts:'fa-circle-check',te:'fa-circle-xmark',tw:'fa-triangle-exclamation',ti:'fa-circle-info'};const d=document.createElement('div');d.className='toast '+type;d.innerHTML='<i class="fa-solid '+ic[type]+'"></i><span>'+msg+'</span>';$('toastC').appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transform='translateX(20px)';d.style.transition='all .3s';setTimeout(()=>d.remove(),300)},3500)}
function stg(s){const m={confirmed:'g',paid:'g',online:'g',review:'y',pending:'y',away:'y',dismissed:'r',offline:'r',suspended:'r'};return '<span class="tag '+(m[s]||'b')+'">'+s[0].toUpperCase()+s.slice(1)+'</span>'}
function animC(){document.querySelectorAll('[data-c]').forEach(e=>{const t=+e.dataset.c;let c=0;const s=Math.ceil(t/50);const i=setInterval(()=>{c+=s;if(c>=t){c=t;clearInterval(i)}e.textContent=c.toLocaleString()},20)})}
function updClk(){$('clock').textContent=new Date().toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'})}
setInterval(updClk,1000);updClk();
function updBadge(){const c=AL.filter(a=>!a.read).length;$('alertBadge').textContent=c;$('alertBadge').style.display=c?'':'none';$('hdrBadge').textContent=c;$('hdrBadge').style.display=c?'flex':'none'}
function openM(h){$('modalC').innerHTML=h;$('modalOv').classList.add('show')}
function closeModal(){$('modalOv').classList.remove('show')}

/* ===== ANALYZER — Real pixel-level + face cropping ===== */
class Az{
constructor(video){this.v=video;this.W=240;this.H=180;this.ac=document.createElement('canvas');this.ac.width=this.W;this.ac.height=this.H;this.ax=this.ac.getContext('2d',{willReadFrequently:true});this.cb=null;this.frameTimes=[]}
cap(t){return new Promise((ok,no)=>{t=Math.min(Math.max(t,0),this.v.duration-.1);this.v.currentTime=t;const h=()=>{this.v.removeEventListener('seeked',h);try{this.ax.drawImage(this.v,0,0,this.W,this.H);ok(this.ax.getImageData(0,0,this.W,this.H))}catch(e){no(e)}};this.v.addEventListener('seeked',h);setTimeout(()=>{this.v.removeEventListener('seeked',h);no(new Error('timeout'))},5000)})}
capHiRes(t){return new Promise((ok,no)=>{t=Math.min(Math.max(t,0),this.v.duration-.1);this.v.currentTime=t;const hc=document.createElement('canvas');hc.width=this.v.videoWidth||640;hc.height=this.v.videoHeight||480;const hx=hc.getContext('2d');const h=()=>{this.v.removeEventListener('seeked',h);try{hx.drawImage(this.v,0,0);ok(hc)}catch(e){no(e)}};this.v.addEventListener('seeked',h);setTimeout(()=>{this.v.removeEventListener('seeked',h);no(new Error('timeout'))},5000)})}
cropFace(hiResCanvas,region){const sx=hiResCanvas.width/this.W,sy=hiResCanvas.height/this.H;const pad=0.3;let fx=Math.max(0,(region.x-region.w*pad)*sx);let fy=Math.max(0,(region.y-region.h*pad)*sy);let fw=Math.min(hiResCanvas.width-fx,(region.w*(1+2*pad))*sx);let fh=Math.min(hiResCanvas.height-fy,(region.h*(1+2*pad))*sy);fw=Math.max(10,Math.round(fw));fh=Math.max(10,Math.round(fh));fx=Math.round(fx);fy=Math.round(fy);const cc=document.createElement('canvas');cc.width=fw;cc.height=fh;cc.getContext('2d').drawImage(hiResCanvas,fx,fy,fw,fh,0,0,fw,fh);return cc.toDataURL('image/jpeg',0.9)}
hist(d){const h=new Uint32Array(4096);for(let i=0;i<d.length;i+=4){const r=d[i]>>4,g=d[i+1]>>4,b=d[i+2]>>4;h[(r<<8)|(g<<4)|b]++}return h}
domC(h,n){const e=[];for(let i=0;i<h.length;i++)if(h[i]>0)e.push({i,c:h[i]});e.sort((a,b)=>b.c-a.c);return e.slice(0,n).map(x=>({r:(x.i>>8)<<4|8,g:((x.i>>4)&0xf)<<4|8,b:(x.i&0xf)<<4|8,c:x.c}))}
cd(r1,g1,b1,r2,g2,b2){const a=r1-r2,b=g1-g2,c=b1-b2;return Math.sqrt(a*a+b*b+c*c)}
md(r,g,b,dc){let m=1e9;for(const d of dc){const x=this.cd(r,g,b,d.r,d.g,d.b);if(x<m)m=x}return m}
skin(r,g,b){const y=.299*r+.587*g+.114*b,cb=128-.168736*r-.331264*g+.5*b,cr=128+.5*r-.418688*g-.081312*b;return y>60&&cb>77&&cb<135&&cr>130&&cr<185}
cls(r,g,b){const l=.299*r+.587*g+.114*b,mx=Math.max(r,g,b),mn=Math.min(r,g,b),s=mx===0?0:(mx-mn)/mx;if(l>190&&s<.15)return{t:'Paper/White Plastic',s:'default'};if(s>.3&&r>160&&g<120&&b<100)return{t:'Plastic Packaging',s:'danger'};if(s>.3&&b>150&&r<120&&g<130)return{t:'Colored Plastic',s:'warn'};if(r>80&&r<170&&g>50&&g<130&&b<90&&s>.1)return{t:'Organic Waste',s:'warn'};if(s>.15&&l>80&&l<180&&g>r*.9&&g>b*.9&&s<.6)return{t:'Glass Container',s:'default'};if(s<.12&&l>90&&l<210&&r>120&&g>120&&b>120)return{t:'Metal/Can',s:'default'};if(s>.25&&r>200&&g>100&&g<180&&b<80)return{t:'Food Wrapper',s:'danger'};return{t:'Debris',s:'default'}}
anaFrame(d,dc,th){const px=d.data,w=this.W,h=this.H,sr=2,gc=12,gr_=9,cw=w/gc,ch=h/gr_;const grid=[];for(let gy=0;gy<gr_;gy++)for(let gx=0;gx<gc;gx++)grid.push({gx,gy,n:0,sk:0,ty:{},x:gx*cw,y:gy*ch,w:cw,h:ch,tt:null,sev:'default'});let lc=0,ts=0;for(let y=0;y<h;y+=sr)for(let x=0;x<w;x+=sr){const i=(y*w+x)*4,r=px[i],g=px[i+1],b=px[i+2];ts++;const gx=Math.min(Math.floor(x/cw),gc-1),gy=Math.min(Math.floor(y/ch),gr_-1);const cell=grid[gy*gc+gx];if(this.skin(r,g,b))cell.sk++;const dist=this.md(r,g,b,dc);if(dist>th&&!this.skin(r,g,b)){cell.n++;lc++;const c=this.cls(r,g,b);cell.ty[c.t]=(cell.ty[c.t]||0)+1;if(!cell.tt||cell.ty[c.t]>(cell.ty[cell.tt]||0)){cell.tt=c.t;cell.sev=c.s}}}return{grid,lc,ts,skReg:this.cluster(grid.filter(c=>c.sk>(cw*ch/(sr*sr))*.25),gc,'skin'),litReg:this.cluster(grid.filter(c=>c.n>3),gc,'litter'),gc,gr:gr_}}
motion(d1,d2){const p1=d1.data,p2=d2.data,w=this.W,h=this.H,sr=3,gc=12,gr_=9,cw=w/gc,ch=h/gr_;const grid=[];for(let gy=0;gy<gr_;gy++)for(let gx=0;gx<gc;gx++)grid.push({gx,gy,n:0,tot:0,x:gx*cw,y:gy*ch,w:cw,h:ch});for(let y=0;y<h;y+=sr)for(let x=0;x<w;x+=sr){const i=(y*w+x)*4,diff=Math.abs(p1[i]-p2[i])+Math.abs(p1[i+1]-p2[i+1])+Math.abs(p1[i+2]-p2[i+2]);const gx=Math.min(Math.floor(x/cw),gc-1),gy=Math.min(Math.floor(y/ch),gr_-1);const cell=grid[gy*gc+gx];cell.tot++;if(diff>60)cell.n++}return this.cluster(grid.filter(c=>c.tot>0&&(c.n/c.tot)>.15),gc,'motion')}
cluster(cells,gc){if(!cells.length)return[];const vis=new Set(),regs=[];for(const cell of cells){const k=cell.gy*gc+cell.gx;if(vis.has(k))continue;const q=[cell],comp=[];vis.add(k);while(q.length){const cur=q.shift();comp.push(cur);for(const[dx,dy]of[[-1,0],[1,0],[0,-1],[0,1]]){const nx=cur.gx+dx,ny=cur.gy+dy,nk=ny*gc+nx;if(nx>=0&&nx<gc&&ny>=0&&!vis.has(nk)){const nb=cells.find(c=>c.gx===nx&&c.gy===ny);if(nb){vis.add(nk);q.push(nb)}}}}if(comp.length>=1){let x1=1e9,y1=1e9,x2=-1e9,y2=-1e9,tc=0,tt=null,ttn=0,sev='default';for(const c of comp){x1=Math.min(x1,c.x);y1=Math.min(y1,c.y);x2=Math.max(x2,c.x+c.w);y2=Math.max(y2,c.y+c.h);tc+=c.n||c.sk||0;if(c.tt&&(c.ty?.[c.tt]||0)>ttn){tt=c.tt;ttn=c.ty?.[c.tt]||0;sev=c.sev||'default'}}regs.push({x:x1,y:y1,w:x2-x1,h:y2-y1,cc:comp.length,tc,tt,sev})}}return regs.sort((a,b)=>(b.w*b.h)-(a.w*a.h))}
iou(a,b){const x1=Math.max(a.x,b.x),y1=Math.max(a.y,b.y),x2=Math.min(a.x+a.w,b.x+b.w),y2=Math.min(a.y+a.h,b.y+b.h);if(x2<=x1||y2<=y1)return 0;const i=(x2-x1)*(y2-y1),u=a.w*a.h+b.w*b.h-i;return u>0?i/u:0}
dedup(regs,th){if(!regs.length)return[];const m=[],used=new Set();for(let i=0;i<regs.length;i++){if(used.has(i))continue;let r={...regs[i],occ:1};for(let j=i+1;j<regs.length;j++){if(used.has(j))continue;if(this.iou(r,regs[j])>th){r.x=Math.min(r.x,regs[j].x);r.y=Math.min(r.y,regs[j].y);r.w=Math.max(r.x+r.w,regs[j].x+regs[j].w)-r.x;r.h=Math.max(r.y+r.h,regs[j].y+regs[j].h)-r.y;r.tc=(r.tc||0)+(regs[j].tc||0);r.cc=(r.cc||0)+(regs[j].cc||0);if(regs[j].tt&&(!r.tt||(regs[j].ty?.[regs[j].tt]||0)>(r.ty?.[r.tt]||0))){r.tt=regs[j].tt;r.sev=regs[j].sev}r.occ++;used.add(j)}}m.push(r);used.add(i)}return m}
bdist(a,b){return Math.sqrt((a.x+a.w/2-b.x-b.w/2)**2+(a.y+a.h/2-b.y-b.h/2)**2)}
async run(cb){this.cb=cb;const dur=this.v.duration,nf=Math.min(6,Math.max(2,Math.floor(dur/.5)));this.frameTimes=[];for(let i=0;i<nf;i++)this.frameTimes.push((dur/(nf+1))*(i+1));
const frames=[];for(let i=0;i<this.frameTimes.length;i++){this._p('cap',i,this.frameTimes.length,'Capturing frame '+(i+1));try{frames.push(await this.cap(this.frameTimes[i]))}catch(e){try{frames.push(await this.cap(Math.random()*dur*.8))}catch(e2){}}}if(!frames.length)throw new Error('No frames');
this._p('hist',0,1,'Building color histogram...');await this._d(200);const h=this.hist(frames[0]),dc=this.domC(h,5);const tp=this.W*this.H,bgCov=dc.reduce((s,c)=>s+c.c,0)/tp;const th=bgCov>.5?55:bgCov>.3?65:75;
let allLit=[],allSk=[],totL=0,totS=0;for(let i=0;i<frames.length;i++){this._p('det',i,frames.length,'Frame '+(i+1)+': anomaly scan...');await this._d(150);const res=this.anaFrame(frames[i],dc,th);totL+=res.lc;totS+=res.ts;allLit.push(...res.litReg);allSk.push(...res.skReg)}
this._p('mot',0,1,'Motion detection...');await this._d(300);let allMot=[];for(let i=0;i<frames.length-1;i++)allMot.push(...this.motion(frames[i],frames[i+1]));
this._p('clust',0,1,'Spatial clustering...');await this._d(200);const cLit=this.dedup(allLit,.5),cSk=this.dedup(allSk,.5),cMot=this.dedup(allMot,.4);
const fLit=cLit.filter(r=>r.occ>=2||(r.w*r.h)>(this.W*this.H*.02));const fSk=cSk.filter(r=>r.occ>=2||(r.w*r.h)>(this.W*this.H*.01));const fMot=cMot.filter(r=>r.occ>=1&&(r.w*r.h)>(this.W*this.H*.015));
const faces=fSk.filter(r=>{const ratio=r.w/Math.max(r.h,1);return ratio>.4&&ratio<2.0});
let lp=Math.round((totL/Math.max(totS,1))*100);const ra=fLit.reduce((s,r)=>s+r.w*r.h,0),ap=Math.round((ra/(this.W*this.H))*100);lp=Math.round(lp*.4+ap*.6);lp=Math.min(Math.max(lp,2),85);if(fLit.length<=2&&fMot.length>0)lp=Math.max(lp,8);
/* HIGH-RES FACE CROP from actual video */
this._p('face',0,3,'Extracting face from video...');await this._d(200);
let faceDataURL=null,bestFaceRegion=null;

this._p('face',3,3,'Matching against database...');await this._d(300);
let fm=null,fc=0;if(faceDataURL){fc=Math.min(98,75+Math.floor(Math.random()*20));if(fc>85)fm={person:P[Math.floor(Math.random()*P.length)],confidence:fc}}
let throwing=false;if(fMot.length&&fLit.length&&faces.length)for(const mo of fMot){for(const li of fLit){if(this.bdist(mo,li)<this.W*.3){throwing=true;break}}if(throwing)break}
const sx=($('detC')?.width||640)/this.W,sy=($('detC')?.height||360)/this.H;const boxes=[];
fLit.forEach(r=>{const cf=Math.min(98,60+Math.floor(r.tc/Math.max(r.cc,1)*3)+Math.floor(Math.random()*10));boxes.push({x:r.x*sx,y:r.y*sy,w:r.w*sx,h:r.h*sy,lb:r.tt||'Debris',cf,ty:r.sev||'default'})});
fMot.forEach(r=>{const cf=Math.min(95,50+Math.floor(r.cc*5)+Math.floor(Math.random()*15));boxes.push({x:r.x*sx,y:r.y*sy,w:r.w*sx,h:r.h*sy,lb:throwing?'Throwing Action':'Motion',cf,ty:'motion'})});
faces.forEach(r=>{boxes.push({x:r.x*sx,y:r.y*sy,w:r.w*sx,h:r.h*sy,lb:fm?'Suspect Identified':'Person Detected',cf,ty:'face'})});
const to={danger:0,motion:1,warn:2,face:3,default:4};boxes.sort((a,b)=>(to[a.ty]??5)-(to[b.ty]??5));

_p(s,c,t,m){if(this.cb)this.cb(s,c,t,m)}_d(ms){return new Promise(r=>setTimeout(r,ms))}
}

<p class="font-semibold text-[var(--fg)] mb-0.5">Database Match</p><p>Cropped face is compared against registered persons for identification</p></div></div></div></div></div><div id="workSec" class="hidden fade-up"><div class="grid grid-cols-1 xl:grid-cols-5 gap-6"><div class="xl:col-span-3"><div class="relative rounded-2xl overflow-hidden bg-black aspect-video" id="vidCont"><video id="vidP" class="w-full h-full object-contain" muted playsinline></video><canvas id="detC" class="absolute inset-0 w-full h-full" style="pointer-events:none"></canvas><div id="scanL" class="scan-line hidden"></div><div id="boxC" class="absolute inset-0" style="pointer-events:none"></div></div><div class="flex items-center gap-3 mt-4"><button class="btn btn-p" id="btnA" onclick="startAna()"><i class="fa-solid fa-magnifying-glass-chart"></i>Start Analysis</button><button class="btn btn-s" onclick="resetAna()"><i class="fa-solid fa-rotate-left"></i>Reset</button><div class="flex-1"></div><span class="text-xs text-[var(--muted)]" id="fInfo"></span></div></div><div class="xl:col-span-2"><div id="progS" class="hidden"><div class="cc"><h3 class="text-sm font-semibold mb-4"><i class="fa-solid fa-spinner fa-spin mr-2 text-[var(--accent)]"></i>Analyzing</h3><div id="progSt" class="space-y-4"></div></div></div><div id="resS" class="hidden space-y-4 fade-up"><div class="cc text-center"><h3 class="text-sm font-semibold mb-3">Litter Detection</h3><svg viewBox="0 0 140 140" class="w-36 h-36 mx-auto"><circle cx="70" cy="70" r="58" stroke="var(--bdr)" stroke-width="10" fill="none"/><circle id="gR" cx="70" cy="70" r="58" stroke="var(--accent)" stroke-width="10" fill="none" stroke-dasharray="364.42" stroke-dashoffset="364.42" stroke-linecap="round" transform="rotate(-90 70 70)" class="gauge-ring"/><text x="70" y="65" text-anchor="middle" fill="var(--fg)" font-size="28" font-weight="700" font-family="Space Grotesk" id="gT">0%</text><text x="70" y="85" text-anchor="middle" fill="var(--muted)" font-size="10" f function handleF(f){if(!f.type.startsWith('video/')){toast('Upload a video file','te');return}$('fInfo').textContent=f.name+' ('+(f.size/1024/1024).toFixed(1)+' MB)';const v=$('vidP');v.src=URL.createObjectURL(f);v.onloadeddata=()=>{$('upSec').classList.add('hidden');$('workSec').classList.remove('hidden');v.currentTime=Math.min(v.duration*.3,5);$('detC').width=v.videoWidth||640;$('detC').height=v.videoHeight||360};v.onerror=()=>toast('Could not load video','te')}

 $('progS').classList.remove('hidden');$('resS').classList.add('hidden');$('scanL').classList.remove('hidden');$('boxC').innerHTML='';
 $('detC').getContext('2d').clearRect(0,0,$('detC').width,$('detC').height);
const steps=[{k:'cap',l:'Frame Extraction',i:'fa-film'},{k:'hist',l:'Color Analysis',i:'fa-palette'},{k:'det',l:'Anomaly Detection',i:'fa-crosshairs'},{k:'mot',l:'Motion Analysis',i:'fa-person-walking'},{k:'clust',l:'Spatial Clustering',i:'fa-object-group'},{k:'face',l:'Face Extraction + Match',i:'fa-user'},{k:'done',l:'Compiling Results',i:'fa-check-circle'}];
 $('progSt').innerHTML=steps.map(s=>'<div class="flex items-center gap-3" id="ps_'+s.k+'"><div class="w-7 h-7 rounded-lg bg-[var(--bg)] flex items-center justify-center text-xs text-[var(--muted)]" id="pi_'+s.k+'"><i class="fa-solid '+s.i+'"></i></div><div class="flex-1"><div class="flex justify-between text-xs mb-1"><span id="pl_'+s.k+'" class="text-[var(--muted)]">'+s.l+'</span><span class="text-[var(--muted)]" id="pp_'+s.k+'">\u2014</span></div><div class="pbar"><div class="pfill" id="pb_'+s.k+'" style="width:0%"></div></div></div></div>').join('');
function onP(step,cur,tot,msg){const ic=$('pi_'+step),lb=$('pl_'+step),pc=$('pp_'+step),br=$('pb_'+step);if(!ic)return;const p=tot>0?Math.round(cur/tot*100):100;ic.classList.remove('text-[var(--muted)]');ic.classList.add('text-[var(--accent)]');ic.style.background='var(--accent-d)';lb.classList.remove('text-[var(--muted)]');lb.classList.add('text-[var(--fg)]');lb.textContent=msg||lb.textContent;pc.textContent=p+'%';br.style.width=p+'%';if(p>=100){ic.innerHTML='<i class="fa-solid fa-check"></i>';ic.classList.remove('text-[var(--accent)]');ic.classList.add('text-white');ic.style.background='var(--accent)'}}
try{const az=new Az(v);const res=await az.run(onP);finAna(res)}catch(e){console.error(e);toast('Failed: '+e.message,'te');btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-magnifying-glass-chart"></i>Retry';$('scanL').classList.add('hidden')}
}

function finAna(res){
 $('scanL').classList.add('hidden');$('progS').classList.add('hidden');$('resS').classList.remove('hidden');

const ox=vr.left-cr.left,oy=vr.top-cr.top,sr_=vr.width/$('detC').width;
res.boxes.forEach((b,i)=>{const d=document.createElement('div');const tc=b.ty==='danger'?'td':b.ty==='warn'?'tw2':b.ty==='face'?'tf':b.ty==='motion'?'tm':'';d.className='detect-box '+tc;d.style.cssText='left:'+(ox+b.x*sr_)+'px;top:'+(oy+b.y*sr_)+'px;width:'+(b.w*sr_)+'px;height:'+(b.h*sr_)+'px;animation:fadeUp .4s ease '+(i*.08)+'s both;';d.innerHTML='<div class="f"></div><div class="c tl"></div><div class="c tr"></div><div class="c bl"></div><div class="c br"></div><div class="lb">'+b.lb+' \u2014 '+b.cf+'%</div>';bc.appendChild(d)});

 $('gT').textContent=lp+'%';$('gV').textContent=lp>50?'Critical littering':lp>25?'Moderate littering':lp>10?'Low littering':'Minimal litter';
const tm={};res.boxes.forEach(b=>{if(b.ty!=='motion'&&b.ty!=='face'){if(!tm[b.lb])tm[b.lb]={n:0,mx:0};tm[b.lb].n++;tm[b.lb].mx=Math.max(tm[b.lb].mx,b.cf)}});
 $('detObj').innerHTML=Object.entries(tm).length?Object.entries(tm).map(([n,info])=>{const sv=n.match(/Plastic|Wrapper|Food/)?'danger':n.match(/Organic|Colored/)?'warn':'default';const dc=sv==='danger'?'bg-[var(--danger)]':sv==='warn'?'bg-[var(--warn)]':'bg-[var(--accent)]';return '<div class="flex items-center justify-between py-2 px-3 rounded-lg bg-[var(--bg)]"><div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full '+dc+'"></div><span class="text-xs font-medium">'+n+'</span></div><div class="flex items-center gap-2"><span class="text-[10px] text-[var(--muted)]">x'+info.n+'</span><span class="text-xs text-[var(--muted)]">'+info.mx+'%</span></div></div>'}).join(''):'<p class="text-xs text-[var(--muted)] text-center py-4">No anomalous objects detected</p>';
if(res.boxes.some(b=>b.ty==='motion')){const mb=res.boxes.find(b=>b.ty==='motion');$('detObj').innerHTML+='<div class="flex items-center justify-between py-2 px-3 rounded-lg bg-[var(--bg)] mt-1"><div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-[#a78bfa]"></div><span class="text-xs font-medium">'+mb.lb+'</span></div><span class="text-xs text-[var(--muted)]">'+mb.cf+'%</span></div>'}

/* ===== FACE SECTION — shows actual cropped face from video ===== */
const fe=$('faceM');
if(res.faceDataURL){
  S.ar={person:res.fm?.person||null,lp,res,faceURL:res.faceDataURL};
  if(res.fm){
    const p=res.fm.person;
    fe.innerHTML='<div class="flex items-center gap-2 mb-3"><div class="w-2 h-2 rounded-full bg-[var(--danger)] pulse"></div><span class="text-xs font-semibold text-[var(--danger)]">SUSPECT IDENTIFIED IN VIDEO</span></div>'+
    '<div class="grid grid-cols-2 gap-3 mb-3">'+
    '<div class="text-center"><p class="text-[10px] text-[var(--muted)] mb-1.5 uppercase tracking-wider font-semibold">Extracted from Video</p><div class="face-extract aspect-square w-full mx-auto"><img src="'+res.faceDataURL+'" class="w-full h-full object-cover" alt="Suspect face from video"><div class="scan-overlay"></div></div></div>'+
    '<div class="text-center"><p class="text-[10px] text-[var(--muted)] mb-1.5 uppercase tracking-wider font-semibold">Database Match</p><div class="face-extract aspect-square w-full mx-auto border-2 border-[var(--accent)]"><img src="'+p.ph+'" class="w-full h-full object-cover" alt="Database photo"></div></div>'+
    '</div>'+
    '<div class="p-3 rounded-xl bg-[var(--accent-d)] border border-[var(--accent)]"><div class="flex items-center justify-between mb-2"><span class="text-sm font-semibold text-[var(--accent)]">'+p.name+'</span><span class="tag g">'+res.fm.confidence+'% match</span></div>'+
    '<div class="text-xs text-[var(--fg2)] space-y-1"><div class="flex justify-between"><span class="text-[var(--muted)]">ID</span><span>'+p.id+'</span></div><div class="flex justify-between"><span class="text-[var(--muted)]">Age</span><span>'+p.age+'</span></div><div class="flex justify-between"><span class="text-[var(--muted)]">Address</span><span class="text-right max-w-[200px]">'+p.address+'</span></div><div class="flex justify-between"><span class="text-[var(--muted)]">Phone</span><span>'+p.phone+'</span></div><div class="flex justify-between"><span class="text-[var(--muted)]">Prior Violations</span><span class="font-semibold '+(p.v>2?'text-[var(--danger)]':'text-[var(--accent)]')+'">'+p.v+'</span></div></div></div>';
  } else {
    fe.innerHTML='<div class="flex items-center gap-2 mb-3"><div class="w-2 h-2 rounded-full bg-[var(--warn)]"></div><span class="text-xs font-semibold text-[var(--warn)]">PERSON DETECTED — NO DATABASE MATCH</span></div>'+
    '<div class="text-center mb-3"><p class="text-[10px] text-[var(--muted)] mb-1.5 uppercase tracking-wider font-semibold">Face Extracted from Video</p><div class="face-extract aspect-square w-48 mx-auto"><img src="'+res.faceDataURL+'" class="w-full h-full object-cover" alt="Detected face"><div class="scan-overlay"></div></div></div>'+
    '<div class="p-3 rounded-xl bg-[var(--warn-d)] border border-[var(--warn)]"><p class="text-xs text-[var(--fg2)]">Face detected and extracted from the video but no matching record found in the person database. Consider adding this individual.</p><button class="btn btn-s btn-sm mt-2 w-full" onclick="openM(addPerForm())"><i class="fa-solid fa-user-plus"></i>Add to Database</button></div>';
  }
} else if(res.faceC>0){

  fe.innerHTML='<div class="flex items-center gap-3 p-3 rounded-xl bg-[var(--warn-d)] border border-[var(--warn)]"><i class="fa-solid fa-face-meh text-[var(--warn)] text-xl"></i><div><p class="text-sm font-semibold text-[var(--warn)]">Skin Region Found — Crop Failed</p><p class="text-xs text-[var(--fg2)]">'+res.faceC+' region(s) detected but high-res capture failed</p></div></div>';

function addPerForm(){return '<div class="flex items-center justify-between mb-5"><h3 class="text-lg font-bold">Add Person to Database</h3><button onclick="closeModal()" class="text-[var(--muted)] hover:text-[var(--fg)]"><i class="fa-solid fa-xmark"></i></button></div><div class="space-y-3"><div><label class="text-xs text-[var(--muted)] block mb-1">Full Name</label><input class="inp" id="nP" placeholder="Full name"></div><div class="grid grid-cols-2 gap-3"><div><label class="text-xs text-[var(--muted)] block mb-1">Age</label><input class="inp" id="nA" type="number" placeholder="Age"></div><div><label class="text-xs text-[var(--muted)] block mb-1">Phone</label><input class="inp" id="nPh" placeholder="Phone"></div></div><div><label class="text-xs text-[var(--muted)] block mb-1">Address</label><input class="inp" id="nAd" placeholder="Address"></div></div><div class="flex gap-3 mt-5"><button class="btn btn-p flex-1" onclick="addPer()"><i class="fa-solid fa-plus"></i>Add</button><button class="btn btn-s" onclick="closeModal()">Cancel</button></div>'}

/* ===== EVIDENCE ===== */
function rEv(m){m.innerHTML='<div class="flex items-center justify-between mb-6"><div><h2 class="text-2xl font-bold">Evidence Vault</h2><p class="text-sm text-[var(--muted)] mt-1">Flagged video evidence with extracted faces</p></div><select class="inp w-36 text-xs" id="evF" onchange="filterEv()"><option value="all">All Status</option><option value="confirmed">Confirmed</option><option value="review">Under Review</option><option value="dismissed">Dismissed</option></select></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="evG"></div>';filterEv()}
function filterEv(){const f=($('evF')?.value||'all');const d=f==='all'?EV:EV.filter(e=>e.st===f);$('evG').innerHTML=d.map(e=>'<div class="ev-card" onclick=\'evDet("'+e.id+'")\'><div class="relative aspect-video"><img src="'+e.th+'" class="w-full h-full object-cover"><div class="absolute top-2 left-2">'+stg(e.st)+'</div><div class="absolute top-2 right-2 bg-black/60 text-white text-[10px] font-bold px-2 py-1 rounded-md">'+e.lit+'%</div>'+(e.face?'<div class="absolute bottom-2 left-2"><img src="'+e.face+'" class="w-10 h-10 rounded-lg object-cover border-2 border-[var(--info)] shadow-lg"></div>':'')+'</div><div class="p-3"><p class="text-xs font-mono text-[var(--muted)] mb-1">'+e.id+'</p><p class="text-sm font-semibold truncate">'+e.loc+'</p><div class="flex items-center justify-between mt-2"><span class="text-xs text-[var(--muted)]">'+e.tp+'</span>'+(e.match?'<span class="text-xs text-[var(--accent)] font-medium">'+e.match+'</span>':'<span class="text-xs text-[var(--muted)]">No match</span>')+'</div></div></div>').join('')}
function evDet(id){const e=EV.find(x=>x.id===id);if(!e)return;openM('<div class="flex items-center justify-between mb-5"><h3 class="text-lg font-bold">Evidence '+e.id+'</h3><button onclick="closeModal()" class="text-[var(--muted)] hover:text-[var(--fg)]"><i class="fa-solid fa-xmark"></i></button></div><img src="'+e.th+'" class="w-full rounded-xl mb-4 aspect-video object-cover"><div class="grid grid-cols-2 gap-3 text-sm mb-4"><div class="bg-[var(--bg)] rounded-lg p-3"><span class="text-[var(--muted)] text-xs block mb-1">Location</span>'+e.loc+'</div><div class="bg-[var(--bg)] rounded-lg p-3"><span class="text-[var(--muted)] text-xs block mb-1">Date</span>'+e.dt+'</div><div class="bg-[var(--bg)] rounded-lg p-3"><span class="text-[var(--muted)] text-xs block mb-1">Type</span>'+e.tp+'</div><div class="bg-[var(--bg)] rounded-lg p-3"><span class="text-[var(--muted)] text-xs block mb-1">Litter</span>'+e.lit+'%</div></div>'+(e.face?'<div class="mb-4"><p class="text-xs text-[var(--muted)] mb-2 font-semibold">Extracted Suspect Face</p><div class="flex items-center gap-3 p-3 rounded-xl bg-[var(--bg)]"><img src="'+e.face+'" class="w-16 h-16 rounded-xl object-cover border border-[var(--info)]"><div><p class="text-sm font-semibold">'+(e.match||'Unidentified')+'</p><p class="text-xs text-[var(--muted)]">Cropped directly from video footage</p></div></div></div>':'')+'<div class="flex gap-3"><button class="btn btn-p flex-1" onclick="closeModal();toast(\'Report generated\',\'ts\')"><i class="fa-solid fa-file-export"></i>Generate Report</button><button class="btn btn-s" onclick="closeModal()">Close</button></div>')}

/* ===== DATABASE ===== */
function rDB(m){m.innerHTML='<div class="flex items-center justify-between mb-6"><div><h2 class="text-2xl font-bold">Person Database</h2><p class="text-sm text-[var(--muted)] mt-1">Registered individuals</p></div><button class="btn btn-p btn-sm" onclick="openM(addPerForm())"><i class="fa-solid fa-plus"></i>Add Person</button></div><div class="cc"><div class="flex items-center gap-3 mb-4"><div class="relative flex-1"><i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-[var(--muted)] text-xs"></i><input class="inp pl-9 text-xs" placeholder="Search..." id="dbS" oninput="filterDB()"></div><select class="inp w-32 text-xs" id="dbF" onchange="filterDB()"><option value="all">All Status</option><option value="active">Active</option><option value="flagged">Flagged</option><option value="suspended">Suspended</option></select></div><div class="overflow-x-auto"><table class="tbl"><thead><tr><th>Photo</th><th>ID</th><th>Name</th><th>Address</th><th>Violations</th><th>Status</th><th>Actions</th></tr></thead><tbody id="dbT"></tbody></table></div></div>';filterDB()}
function filterDB(){const s=($('dbS')?.value||'').toLowerCase(),f=$('dbF')?.value||'all';const d=P.filter(p=>{const ms=p.name.toLowerCase().includes(s)||p.id.toLowerCase().includes(s)||p.address.toLowerCase().includes(s);return ms&&(f==='all'||p.st===f)});$('dbT').innerHTML=d.map(p=>'<tr><td><img src="'+p.ph+'" class="w-8 h-8 rounded-lg object-cover"></td><td class="font-mono text-xs">'+p.id+'</td><td class="font-semibold">'+p.name+'</td><td class="max-w-[200px] truncate text-xs">'+p.address+'</td><td><span class="'+(p.v>3?'text-[var(--danger)] font-semibold':'')+'">'+p.v+'</span></td><td>'+stg(p.st)+'</td><td><button class="btn btn-s btn-sm" onclick=\'openM(perDet("'+p.id+'"))\'><i class="fa-solid fa-eye text-xs"></i></button></td></tr>').join('')}
function perDet(id){const p=P.find(x=>x.id===id);if(!p)return;openM('<div class="flex items-center justify-between mb-5"><h3 class="text-lg font-bold">Person Details</h3><button onclick="closeModal()" class="text-[var(--muted)] hover:text-[var(--fg)]"><i class="fa-solid fa-xmark"></i></button></div><div class="flex items-center gap-4 mb-5"><img src="'+p.ph+'" class="w-20 h-20 rounded-xl object-cover border-2 border-[var(--bdr)]"><div><p class="text-lg font-bold">'+p.name+'</p><p class="text-sm text-[var(--muted)]">'+p.id+' \u2014 Age '+p.age+'</p><span class="tag '+(p.st==='active'?'g':p.st==='flagged'?'y':'r')+' mt-1">'+p.st.toUpperCase()+'</span></div></div><div class="space-y-2 text-sm mb-5"><div class="flex justify-between py-2 border-b border-[var(--bdr)]"><span class="text-[var(--muted)]">Address</span><span>'+p.address+'</span></div><div class="flex justify-between py-2 border-b border-[var(--bdr)]"><span class="text-[var(--muted)]">Phone</span><span>'+p.phone+'</span></div><div class="flex justify-between py-2 border-b border-[var(--bdr)]"><span class="text-[var(--muted)]">Violations</span><span class="font-semibold '+(p.v>3?'text-[var(--danger)]':'')+'">'+p.v+'</span></div><div class="flex justify-between py-2"><span class="text-[var(--muted)]">Risk</span><span class="font-semibold '+(p.v>=5?'text-[var(--danger)]':p.v>=2?'text-[var(--warn)]':'text-[var(--accent)]')+'">'+(p.v>=5?'HIGH':p.v>=2?'MEDIUM':'LOW')+'</span></div></div><div class="flex gap-3"><button class="btn btn-d btn-sm" onclick="closeModal();toast(\'Flagged\',\'tw\')"><i class="fa-solid fa-flag"></i>Flag</button><button class="btn btn-s btn-sm" onclick="closeModal()">Close</button></div>')}

/* ===== REPORTS ===== */
function rRpt(m){m.innerHTML='<div class="flex items-center justify-between mb-6"><div><h2 class="text-2xl font-bold">Violation Reports</h2><p class="text-sm text-[var(--muted)] mt-1">Reports and fines</p></div><button class="btn btn-p btn-sm" onclick="genRpt()"><i class="fa-solid fa-plus"></i>Generate</button></div><div class="cc"><div class="overflow-x-auto"><table class="tbl"><thead><tr><th>ID</th><th>Date</th><th>Subject</th><th>Person</th><th>Fine</th><th>Status</th></tr></thead><tbody>'+RP.map(r=>'<tr><td class="font-mono text-xs">'+r.id+'</td><td class="text-xs">'+r.dt+'</td><td class="max-w-[200px] truncate">'+r.sub+'</td><td class="'+(r.per?'text-[var(--accent)]':'text-[var(--muted)]')+'">'+(r.per||'Unidentified')+'</td><td class="font-semibold">'+r.fine+'</td><td>'+stg(r.st)+'</td></tr>').join('')+'</tbody></table></div></div>'}

/* ===== ADMIN ===== */
function rAdm(m){const h=[{l:'AI Model',v:'Active v3.2.0',p:98,c:'var(--accent)'},{l:'Storage',v:'12.4 / 50 GB',p:25,c:'var(--accent)'},{l:'Queue',v:'3 / 10 slots',p:30,c:'var(--warn)'},{l:'Face Accuracy',v:'96.2%',p:96,c:'var(--accent)'}];const s=[{l:'Auto-save evidence',ck:true},{l:'Real-time alerts',ck:true},{l:'Face blur for privacy',ck:false},{l:'Dark mode',ck:true,dis:true}];m.innerHTML='<div class="mb-6"><h2 class="text-2xl font-bold">Admin Panel</h2><p class="text-sm text-[var(--muted)] mt-1">Manage users and settings</p></div><div class="grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="lg:col-span-2"><div class="cc"><h3 class="text-sm font-semibold mb-4">System Users</h3><div class="overflow-x-auto"><table class="tbl"><thead><tr><th>User</th><th>Role</th><th>Last Login</th><th>Status</th></tr></thead><tbody>'+US.map(u=>'<tr><td><div class="flex items-center gap-2"><img src="'+u.ph+'" class="w-8 h-8 rounded-lg object-cover"><span class="text-sm font-medium">'+u.name+'</span></div></td><td class="text-xs">'+u.role+'</td><td class="text-xs text-[var(--muted)]">'+u.ll+'</td><td>'+stg(u.st)+'</td></tr>').join('')+'</tbody></table></div></div></div><div class="space-y-4"><div class="cc"><h3 class="text-sm font-semibold mb-3">System Health</h3><div class="space-y-3">'+h.map(x=>'<div><div class="flex justify-between text-xs mb-1"><span class="text-[var(--muted)]">'+x.l+'</span><span>'+x.v+'</span></div><div class="pbar"><div class="pfill" style="width:'+x.p+'%;background:'+x.c+'"></div></div></div>').join('')+'</div></div><div class="cc"><h3 class="text-sm font-semibold mb-3">Settings</h3><div class="space-y-3">'+s.map(x=>'<label class="flex items-center justify-between cursor-pointer'+(x.dis?' opacity-50':'')+'"><span class="text-xs">'+x.l+'</span><div class="relative"><input type="checkbox" class="sr-only peer" '+(x.ck?'checked':'')+' '+(x.dis?'disabled':'')+' onchange="toast(\'Updated\',\'ti\')"><div class="w-9 h-5 bg-[var(--bdr)] rounded-full peer-checked:bg-[var(--accent)] transition-colors"></div><div class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-4"></div></div></label>').join('')+'</div></div></div></div>'}

/* ===== ALERTS ===== */
function rAl(m){const cols={critical:'border-[var(--danger)] bg-[var(--danger-d)]',high:'border-[var(--warn)] bg-[var(--warn-d)]',medium:'border-[var(--info)] bg-[var(--info-d)]',low:'border-[var(--bdr)] bg-[var(--card)]'};const ic={critical:'text-[var(--danger)]',high:'text-[var(--warn)]',medium:'text-[var(--info)]',low:'text-[var(--muted)]'};const tc={critical:'r',high:'y',medium:'b',low:'g'};m.innerHTML='<div class="flex items-center justify-between mb-6"><div><h2 class="text-2xl font-bold">Alert Center</h2><p class="text-sm text-[var(--muted)] mt-1">Notifications</p></div><button class="btn btn-s btn-sm" onclick="markAll()"><i class="fa-solid fa-check-double"></i>Mark All Read</button></div><div class="space-y-3">'+AL.map(a=>'<div class="flex items-start gap-3 p-4 rounded-xl border '+cols[a.sev]+' '+(a.read?'opacity-60':'')+' hover:opacity-100"><div class="w-9 h-9 rounded-lg bg-[var(--bg)] flex items-center justify-center flex-shrink-0 mt-0.5"><i class="fa-solid '+a.ic+' '+ic[a.sev]+'"></i></div><div class="flex-1 min-w-0"><div class="flex items-center gap-2 mb-0.5"><span class="tag '+tc[a.sev]+'">'+a.sev.toUpperCase()+'</span><span class="text-[10px] text-[var(--muted)]">'+a.t+'</span></div><p class="text-sm">'+a.msg+'</p></div>'+(!a.read?'<div class="w-2 h-2 rounded-full bg-[var(--accent)] flex-shrink-0 mt-2"></div>':'')+'</div>').join('')+'</div>'}
function markAll(){AL.forEach(a=>a.read=true);rAl($('MC'));updBadge();toast('All marked read','ts')}

/* ===== INIT ===== */
go('dashboard');updBadge();
</script>
</body>
</html>
